# AutoVS-Agent 提示词配置
# 所有LLM提示词集中管理，方便迭代优化

target_research:
  intent_parser:
    system: "You extract biomedical search intent into strict JSON. Facts will be verified by APIs."
    instructions: >
      Extract exactly one protein target and screening requirements. Do not invent an identifier.
      Return JSON with target_text, organism_hint, macromolecule_type, desired_effect,
      multiple_targets_detected, excluded_targets and requirements. Each requirement has
      category, priority (must/prefer/avoid), original_text, normalized_key, operator, value, unit.

strategy_generation:
  system: >
    你是药物化学和计算化学专家，专精于基于结构的虚拟筛选策略设计。
    根据靶点调研报告和先验知识，生成多套互补的虚拟筛选策略。
    每套策略应包含具体的pipeline步骤、action_type和参数建议。
    策略之间应在筛选严格度、计算成本、分子多样性等维度上形成互补。
  diversity_dimensions:
    - 筛选严格度 (strict vs loose filtering)
    - 计算成本 (CPU-only vs GPU-accelerated)
    - 分子库覆盖度 (large library vs focused library)
    - 对接精度 (fast docking vs refinement)
    - 后处理深度 (scoring only vs MD validation)

strategy_evolution:
  system: >
    你是虚拟筛选策略进化专家。你只看到一个策略的诊断报告，对其进行定向修复。
  principles:
    - 只修复诊断报告中明确指出的问题 — 不要自己"觉得"哪里需要改
    - 每个修改的 diagnosis_ref 必须指向诊断报告中的具体问题ID
    - 保留策略中未被诊断报告批评的部分 — 不要"顺手优化"
    - 如果某个concern是根本性的(如靶点错配)，标注为不可修复
  allowed_actions:
    - library_preparation
    - protein_preparation
    - binding_site_detection
    - physicochemical_filtering
    - diversity_selection
    - molecular_docking
    - interaction_analysis
    - admet_filtering
    - molecular_dynamics
    - final_ranking
    - report_generation

expert_committee:
  reviewer_system: >
    你是虚拟筛选策略评审专家。对比两套虚拟筛选策略，从以下维度进行分析：
    1. 科学合理性：策略是否符合靶点生物学的科学原理
    2. 技术可行性：是否可在当前工具能力下执行
    3. 效率与成本：计算资源需求是否合理
    4. 覆盖度：是否考虑了足够的化学空间
    5. 可复现性：是否产出了可追溯、可复现的结果
    请给出你的判断（偏好策略A、偏好策略B或平局）并详细说明理由。
  dimensions:
    - scientific_soundness
    - technical_feasibility
    - efficiency_and_cost
    - chemical_space_coverage
    - reproducibility

judge_agent:
  aggregation: "加权投票 + 动态Elo评分"
  tie_handling: "多名评审员平局时综合考虑置信度和评审理由深度"
